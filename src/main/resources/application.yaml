spring:
  application:
    name: person_tasks
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: test
    password: test
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
logging:
  file:
    name: logs/app.log
  level:
    root: INFO
    org.example.spring_demo: DEBUG
    org.springframework.web: INFO
    # org.hibernate.SQL: DEBUG
    # org.hibernate.orm.jdbc.bind: TRACE  #--> uncommit for showing SQL with parameters
  logback:
    rollingpolicy:
      max-file-size: 500MB
      max-history: 7
      total-size-cap: 2000MB
      clean-history-on-start: true
