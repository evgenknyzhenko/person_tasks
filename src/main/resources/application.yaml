spring:
  application:
    name: person_tasks
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USERNAME:test}
    password: ${DB_PASSWORD:test}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    show-sql: false #--> set true for showing SQL scripts in the logs
    hibernate:
      ddl-auto: validate
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 200
        page-parameter: page
        size-parameter: size
      sort:
        sort-parameter: sort
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
logging:
  file:
    name: logs/app.log
  level:
    root: INFO
    org.example.spring_demo: DEBUG
    org.springframework.web: INFO
    # org.hibernate.SQL: DEBUG
    # org.hibernate.orm.jdbc.bind: TRACE  #--> uncommit for showing SQL with parameters
  logback:
    rollingpolicy:
      max-file-size: 500MB
      max-history: 7
      total-size-cap: 2000MB
      clean-history-on-start: true
